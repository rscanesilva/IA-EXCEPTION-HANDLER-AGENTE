name: Deploy Server

on:
  push:
    branches:
      - main
    paths:
      - 'exception-intelligence-server/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: exception-intelligence-server
  NAMESPACE: exception-agent

jobs:
  build-and-push:
    name: Build JAR & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn --no-transfer-progress -B package -DskipTests
        working-directory: exception-intelligence-server

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: exception-intelligence-server
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

  deploy-ia-agent-test:
    name: Deploy to ia-agent-test (K8s)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ia-agent-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_IA_AGENT_TEST }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply K8s manifests (first deploy)
        run: |
          kubectl apply -f k8s/server/namespace.yaml
          kubectl apply -f k8s/server/configmap.yaml
          kubectl apply -f k8s/server/service.yaml
          kubectl apply -f k8s/server/ingress.yaml
          # secret.template.yaml NÃO é aplicado aqui — crie manualmente com valores reais

      - name: Update deployment image
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          # Substitui o placeholder OWNER pela imagem ECR real e aplica
          sed "s|ghcr.io/OWNER/exception-intelligence-server:latest|${IMAGE_TAG}|g" \
            k8s/server/deployment.yaml | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/exception-intelligence-server \
            --namespace=${{ env.NAMESPACE }} \
            --timeout=120s

      - name: Show pod status
        if: always()
        run: kubectl get pods -n ${{ env.NAMESPACE }} -l app=exception-intelligence-server

      - name: Show pod status
        if: always()
        run: kubectl get pods -n ${{ env.NAMESPACE }} -l app=exception-intelligence-server
