apiVersion: v1
kind: ConfigMap
metadata:
  name: exception-intelligence-server-config
  namespace: exception-agent
data:
  # ── LLM ────────────────────────────────────────────────────────────────────
  EXCEPTION_INTELLIGENCE_LLM_PROVIDER: "bedrock"   # claude | bedrock | openai | gemini
  EXCEPTION_INTELLIGENCE_LLM_CLAUDE_MODEL: "claude-sonnet-4-6"
  EXCEPTION_INTELLIGENCE_LLM_CLAUDE_MAX_TOKENS: "2048"
  EXCEPTION_INTELLIGENCE_LLM_CLAUDE_TIMEOUT_SECONDS: "30"
  EXCEPTION_INTELLIGENCE_LLM_BEDROCK_REGION: "us-east-1"
  EXCEPTION_INTELLIGENCE_LLM_BEDROCK_MODEL_ID: "us.anthropic.claude-sonnet-4-6"
  EXCEPTION_INTELLIGENCE_LLM_BEDROCK_MAX_TOKENS: "2048"

  # ── SCM ────────────────────────────────────────────────────────────────────
  EXCEPTION_INTELLIGENCE_SCM_PROVIDER: "github"
  EXCEPTION_INTELLIGENCE_SCM_GITHUB_BASE_BRANCH: "main"
  EXCEPTION_INTELLIGENCE_SCM_GITHUB_ISSUE_ENABLED: "true"
  EXCEPTION_INTELLIGENCE_SCM_GITHUB_PULL_REQUEST_ENABLED: "true"

  # ── Issue tracker ──────────────────────────────────────────────────────────
  EXCEPTION_INTELLIGENCE_ISSUE_TRACKER_TYPE: "jira"   # github | jira

  # ── Notifications ──────────────────────────────────────────────────────────
  EXCEPTION_INTELLIGENCE_NOTIFICATION_PROVIDER: "teams"
  EXCEPTION_INTELLIGENCE_NOTIFICATION_TEAMS_ENABLED: "true"
  EXCEPTION_INTELLIGENCE_NOTIFICATION_SLACK_ENABLED: "false"

  # ── Deduplication ──────────────────────────────────────────────────────────
  EXCEPTION_INTELLIGENCE_DEDUPLICATION_ENABLED: "true"
  EXCEPTION_INTELLIGENCE_DEDUPLICATION_TTL_MINUTES: "60"
  EXCEPTION_INTELLIGENCE_DEDUPLICATION_STORE: "memory"   # memory | redis
  MANAGEMENT_HEALTH_REDIS_ENABLED: "false"

  # ── SQS ingest ─────────────────────────────────────────────────────────────
  EXCEPTION_INTELLIGENCE_SQS_ENABLED: "false"
  SPRING_CLOUD_AWS_SQS_ENABLED: "false"
  SPRING_CLOUD_AWS_REGION_STATIC: "us-east-1"

  # ── Idioma das respostas do LLM ────────────────────────────────────────────
  EXCEPTION_INTELLIGENCE_RESPONSE_LANGUAGE: "pt-BR"

  # ── Server ─────────────────────────────────────────────────────────────────
  SERVER_PORT: "8090"
